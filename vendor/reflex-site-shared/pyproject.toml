[project]
name = "reflex-site-shared"
dynamic = ["version"]
description = "Reflex Site Shared."
license.text = "Apache-2.0"
readme = "README.md"
authors = [{ name = "Khaleel Al-Adhami", email = "khaleel@reflex.dev" }]
maintainers = [{ name = "Khaleel Al-Adhami", email = "khaleel@reflex.dev" }]
requires-python = ">=3.10"
dependencies = [
    "email-validator",
    "httpx",
    "pyyaml",
    "reflex-components-internal",
    "reflex-docgen",
    "reflex-integrations-docs",
    "reflex >= 0.9.0",
    "ruff-format",
]


[tool.hatch.version]
source = "uv-dynamic-versioning"

[tool.uv-dynamic-versioning]
pattern-prefix = "reflex-site-shared-"
fallback-version = "0.0.0dev0"

[tool.hatch.build]
targets.sdist.artifacts = ["*.pyi"]
targets.wheel.artifacts = ["*.pyi"]

[build-system]
requires = ["hatchling", "uv-dynamic-versioning"]
build-backend = "hatchling.build"
